<!DOCTYPE html> <html lang="es"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Gestor de Pedidos - Creaciones Normita</title> <style> * { margin: 0; padding: 0; box-sizing: border-box; } body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background: #f5f5f5; color: #333; padding: 20px; } .container { max-width: 1200px; margin: 0 auto; background: white; border-radius: 8px; padding: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); } h1 { color: #2c3e50; margin-bottom: 30px; text-align: center; font-size: 28px; } .tabs { display: flex; border-bottom: 2px solid #e0e0e0; margin-bottom: 30px; gap: 0; } .tab-btn { background: none; border: none; padding: 12px 20px; font-size: 14px; cursor: pointer; border-bottom: 3px solid transparent; color: #666; transition: all 0.3s; } .tab-btn.active { color: #0066cc; border-bottom-color: #0066cc; } .tab-btn:hover { color: #0066cc; } .tab-content { display: none; } .tab-content.active { display: block; } form { display: flex; flex-direction: column; gap: 15px; } .form-group { display: flex; flex-direction: column; } label { font-weight: 500; margin-bottom: 6px; font-size: 13px; color: #555; } input, select, textarea { padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; font-family: inherit; } input:focus, select:focus, textarea:focus { outline: none; border-color: #0066cc; box-shadow: 0 0 0 3px rgba(0, 102, 204, 0.1); } textarea { resize: vertical; min-height: 80px; } button { background: #0066cc; color: white; border: none; padding: 12px 24px; border-radius: 6px; font-size: 14px; cursor: pointer; font-weight: 500; transition: all 0.3s; } button:hover { background: #0052a3; } button:active { transform: scale(0.98); } .success-message { background: #d4edda; color: #155724; padding: 12px; border-radius: 6px; margin-bottom: 20px; display: none; } .error-message { background: #f8d7da; color: #721c24; padding: 12px; border-radius: 6px; margin-bottom: 20px; display: none; } .orders-list { display: flex; flex-direction: column; gap: 15px; } .order-card { background: #f9f9f9; border: 1px solid #e0e0e0; border-radius: 6px; padding: 15px; } .order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; } .order-id { font-weight: 600; font-size: 15px; } .order-status { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; } .status-pending { background: #fff3cd; color: #856404; } .status-process { background: #d1ecf1; color: #0c5460; } .status-completed { background: #d4edda; color: #155724; } .status-delivered { background: #e2e3e5; color: #383d41; } .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; } .stat-card { background: #f0f7ff; border: 1px solid #0066cc; border-radius: 6px; padding: 20px; text-align: center; } .stat-label { font-size: 12px; color: #666; margin-bottom: 8px; } .stat-value { font-size: 28px; font-weight: 600; color: #0066cc; } .no-data { text-align: center; padding: 40px 20px; color: #999; } </style> </head> <body> <div class="container"> <h1>Gestor de Pedidos - Creaciones Normita</h1> <div class="tabs"> <button class="tab-btn active" onclick="switchTab('create')">Nuevo Pedido</button> <button class="tab-btn" onclick="switchTab('orders')">Mis Pedidos</button> <button class="tab-btn" onclick="switchTab('dashboard')">Resumen</button> </div> <!-- TAB: CREAR PEDIDO --> <div id="create" class="tab-content active"> <h2>Crear nuevo pedido</h2> <div class="success-message" id="successMsg">✅ Pedido creado exitosamente</div> <form id="pedidoForm"> <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;"> <div class="form-group"> <label>Nombre del cliente</label> <input type="text" id="cliente" required placeholder="Ej: Tienda Central"> </div> <div class="form-group"> <label>Email cliente</label> <input type="email" id="emailCliente" placeholder="cliente@example.com"> </div> </div> <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;"> <div class="form-group"> <label>Nombre del producto</label> <input type="text" id="producto" required placeholder="Ej: Vestido rojo"> </div> <div class="form-group"> <label>Descripción</label> <input type="text" id="descripcion" placeholder="Detalles adicionales"> </div> </div> <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px;"> <div class="form-group"> <label>Cantidad</label> <input type="number" id="cantidad" required min="1" value="1"> </div> <div class="form-group"> <label>Precio unitario ($)</label> <input type="number" id="precioUnitario" required min="0" step="0.01"> </div> <div class="form-group"> <label>Fecha vencimiento</label> <input type="date" id="fechaVencimiento" required> </div> </div> <div class="form-group"> <label>Notas especiales</label> <textarea id="notas" placeholder="Instrucciones de confección, colores especiales, etc."></textarea> </div> <button type="submit">Crear Pedido</button> </form> </div> <!-- TAB: MIS PEDIDOS --> <div id="orders" class="tab-content"> <h2>Pedidos registrados</h2> <div class="orders-list" id="ordersList"> <div class="no-data">No hay pedidos aún</div> </div> </div> <!-- TAB: DASHBOARD --> <div id="dashboard" class="tab-content"> <h2>Resumen de actividad</h2> <div class="stats"> <div class="stat-card"> <div class="stat-label">Total de pedidos</div> <div class="stat-value" id="statTotal">0</div> </div> <div class="stat-card"> <div class="stat-label">En proceso</div> <div class="stat-value" id="statProcess">0</div> </div> <div class="stat-card"> <div class="stat-label">Terminados</div> <div class="stat-value" id="statCompleted">0</div> </div> <div class="stat-card"> <div class="stat-label">Entregados</div> <div class="stat-value" id="statDelivered">0</div> </div> </div> <h3>Ingresos totales: <span id="totalRevenue">$0</span></h3> </div> </div> <script> const STORAGE_KEY = 'pedidos_creaciones_normita'; function switchTab(tabName) { document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active')); document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active')); document.getElementById(tabName).classList.add('active'); event.target.classList.add('active'); if (tabName === 'orders') renderOrders(); if (tabName === 'dashboard') renderDashboard(); } function loadData() { const data = localStorage.getItem(STORAGE_KEY); return data ? JSON.parse(data) : []; } function saveData(pedidos) { localStorage.setItem(STORAGE_KEY, JSON.stringify(pedidos)); } function generateId() { return 'PED-' + Date.now().toString(36).toUpperCase(); } document.getElementById('pedidoForm').addEventListener('submit', function(e) { e.preventDefault(); const pedido = { id: generateId(), cliente: document.getElementById('cliente').value, email: document.getElementById('emailCliente').value, producto: document.getElementById('producto').value, descripcion: document.getElementById('descripcion').value, cantidad: parseInt(document.getElementById('cantidad').value), precioUnitario: parseFloat(document.getElementById('precioUnitario').value), total: parseInt(document.getElementById('cantidad').value) * parseFloat(document.getElementById('precioUnitario').value), fechaCreacion: new Date().toISOString().split('T')[0], fechaVencimiento: document.getElementById('fechaVencimiento').value, estado: 'pendiente', notas: document.getElementById('notas').value }; const pedidos = loadData(); pedidos.push(pedido); saveData(pedidos); this.reset(); document.getElementById('successMsg').style.display = 'block'; setTimeout(() => { document.getElementById('successMsg').style.display = 'none'; }, 3000); }); function renderOrders() { const pedidos = loadData(); const ordersList = document.getElementById('ordersList'); if (pedidos.length === 0) { ordersList.innerHTML = '<div class="no-data">No hay pedidos aún</div>'; return; } ordersList.innerHTML = pedidos.map(p => ` <div class="order-card"> <div class="order-header"> <span class="order-id">${p.id}</span> <select onchange="updateStatus('${p.id}', this.value)" style="padding: 6px 10px; border-radius: 4px; border: 1px solid #ddd;"> <option value="pendiente" ${p.estado === 'pendiente' ? 'selected' : ''}>Pendiente</option> <option value="proceso" ${p.estado === 'proceso' ? 'selected' : ''}>En proceso</option> <option value="terminado" ${p.estado === 'terminado' ? 'selected' : ''}>Terminado</option> <option value="entregado" ${p.estado === 'entregado' ? 'selected' : ''}>Entregado</option> </select> </div> <p><strong>Cliente:</strong> ${p.cliente}</p> <p><strong>Producto:</strong> ${p.producto}</p> <p><strong>Cantidad:</strong> ${p.cantidad} | <strong>Total:</strong> $${p.total.toFixed(2)}</p> <button onclick="deletePedido('${p.id}')" style="background: #dc3545; margin-top: 10px;">Eliminar</button> </div> `).join(''); } function updateStatus(id, newStatus) { const pedidos = loadData(); const pedido = pedidos.find(p => p.id === id); if (pedido) { pedido.estado = newStatus; saveData(pedidos); renderOrders(); } } function deletePedido(id) { if (confirm('¿Estás seguro de que deseas eliminar este pedido?')) { const pedidos = loadData().filter(p => p.id !== id); saveData(pedidos); renderOrders(); } } function renderDashboard() { const pedidos = loadData(); const total = pedidos.length; const proceso = pedidos.filter(p => p.estado === 'proceso').length; const terminado = pedidos.filter(p => p.estado === 'terminado').length; const entregado = pedidos.filter(p => p.estado === 'entregado').length; const revenue = pedidos.reduce((sum, p) => sum + p.total, 0); document.getElementById('statTotal').textContent = total; document.getElementById('statProcess').textContent = proceso; document.getElementById('statCompleted').textContent = terminado; document.getElementById('statDelivered').textContent = entregado; document.getElementById('totalRevenue').textContent = '$' + revenue.toFixed(2); } </script> </body> </html>
